es:
  daily_challenge:
    check_in:
      already_exists: "Ya existe un check-in para este usuario en esa fecha."
      already_exists_this_week: "Ya existe un check-in para este usuario durante esa semana."
    weekly_post:
      title: "Leaderboard Semanal Fitness Challenge"
      period: "Semana de %{start} – %{finish}"
      days_elapsed: "Día **%{elapsed}** de **%{total}**"
      user: "Participante"
      check_ins: "Check-ins"
      goal: "Objetivo"
      progress: "Progreso"
      no_participants: "*No hay cheques grabados todavía. ¡Sé el primero!*"
      footer: "¡Sigue adelante! Usa el hashtag o publica una foto para registrarte. 🔥"
    final_post:
      title: "Desafío completado — Resultados finales :trofeo:"
      intro: "El desafío de fitness **#%{hashtag}** ha terminado. ¡Aquí están los resultados finales!"
      eligible_header: "### Participantes que completaron el desafío"
      row: "- @%{username} — Check-ins %{count}"
      congrats: "🏆 Felicitaciones a todos los que han completado el desafío!"
      no_completions: "*Ningún participante ha alcanzado la meta de check-in de %{needed} esta vez. ¡Gracias a todos los que participaron!*"
      summary: "**%{completed} de %{total} participantes** completó el desafío alcanzando %{needed} check-ins."
    badge:
      description_with_topic: "Otorgada a los participantes que hayan completado todos los Check-ins requeridos en %{title}."
      description_fallback: "Otorgado por completar con éxito un desafío de fitness."
    errors:
      access_denied: "No tienes permiso para gestionar este desafío."
      badge_name_required: "El nombre de la insignia es necesario cuando se otorga una insignia de terminación."
      category_access_denied: "Sólo puedes crear desafíos en categorías que moderes."
    bot:
      checkin_dm_title: "Check-in confirmado!"
      checkin_dm_body: |
        ✅ Check-in grabado para %{topic_link}!

        Tu racha actual: **%{streak_text}** 🔥
        Progreso: **%{check_ins} de %{needed}** Check-ins completadas
      checkin_dm_body_first: |
        🎉 ¡Bienvenido al desafío! Tu primer check-in para %{topic_link} ha sido registrado. Buen comienzo, ¡sigue así!

        Necesitas **%{needed}** entradas para completar el challenge. ¡Tienes esto! 💪
      completion_dm_title: "¡Desafío completado! 🏆"
      completion_dm_body_with_badge: |
        🏆 Amazing work! You've completed the %{topic_link} challenge with **%{check_ins}**!

        You've qualified for the **%{badge_name}** badge — it will be awarded when the challenge ends. Incredible effort! 🎉
      completion_dm_body: |
        🏆 ¡trabajo increíble! ¡Has completado el desafío %{topic_link} con **%{check_ins}**!

        Un esfuerzo increíble — ¡felicidades por acabar fuerte! 🎉
      reminder_dm_title: "No te olvides de registrarte — %{challenge_name}"
      checkin_count:
        one: "1 check-in"
        other: "%{count} cheques"
      reminder_dm_body: |
        👋 ¡Hola! No te hemos visto registrarte en %{topic_link} desde hace unos días. Tienes **%{checkin_count}** hasta ahora — necesitas **%{needed}** para completar el desafío. ¡No te rindas!
      reminder_dm_body_2: |
        👋 Ha pasado una semana desde tu último check-in en %{topic_link}. ¡No es demasiado tarde para saltar! Tienes **%{checkin_count}** hacia tu objetivo de **%{needed}**. ¡Nos encantaría verte de vuelta! 💪
      rate_limit_dm_title: "¡Despacio!"
      rate_limit_dm_body: "Estás enviando comandos demasiado rápido. Por favor, espera un rato antes de intentarlo de nuevo."
      streak_day:
        one: "Racha de 1 día"
        other: "Racha de %{count}días"
      streak_week:
        one: "Racha de 1 semana"
        other: "Racha de %{count}semana"
      mention_dm_title: "Re: %{command} — %{challenge_name}"
      commands:
        status_header: "**Tu estado de desafío activo:**"
        status_row: "- **%{challenge}** — %{check_ins} check-ins · %{streak} · %{pct}% complete"
        status_none: "Aún no has participado en ningún desafío activo."
        leaderboard_header: "**Clasificación actual para %{challenge}** (top 10):"
        leaderboard_row: "%{rank}. @%{username} — %{count} entradas"
        leaderboard_none: "No hay cheques grabados todavía."
        streak_message: "Tu racha actual en **%{challenge}**: **%{streak_text}** 🔥"
        streak_none: "Aún no has ingresado a **%{challenge}**."
        checkins_header: "**Tus cheques para %{challenge}** (%{count} total):"
        checkins_row: "- %{date}"
        checkins_none: "No hay cheques grabados todavía."
        progress_message: |
          **Progreso de %{challenge}**

          - Comunicaciones: %{done} / %{needed}
          - %{time_remaining}
          - Estado: %{status}
        progress_time_remaining_day:
          one: "1 día restante"
          other: "%{count} días restantes"
        progress_time_remaining_week:
          one: "1 semana restante"
          other: "%{count} weeks remaining"
        progress_on_track: "En la pista ✅"
        progress_behind: "Behind — ¡recogela! 💪"
        progress_complete: "¡Objetivo alcanzado! 🏆"
        unknown_command: "Comando desconocido. Esto es lo que puedo hacer:"
        help: |
          **@ Comandos%{bot_username} :**

          - `status` — tus estadísticas a lo largo de todos los desafíos activos
          - `leaderboard` — top 10 para este challenge
          - `streak` — tu racha actual
          - `checkins` — todas tus fechas de check-in
          - `progreso` — facturas hechas vs necesarias, tiempo restante
          - `help` - mostrar este mensaje
  site_settings:
    daily_challenge_enabled: "Desafíos de Discurso habilitados"
    daily_challenge_mod_access_enabled: "Acceso de mods para desafíos de discurso habilitado"
    daily_challenge_category_mod_access_enabled: "Acceso de mods a la categoría de Desafíos de Discourse habilitado"
    daily_challenge_bot_username: "Nombre de usuario para las confirmaciones de facturación, recordatorios y comandos de @mention (dejar en blanco para desactivar). Nombre de usuario sensible a mayúsculas y minúsculas, introdúzcalo exactamente como aparece en el Discurso."
